name: UI Tests

on:
  push:
    branches:
      - develop
  pull_request:

concurrency:
  group: ui-tests-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    name: Playwright E2E

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB Client
        run: |
          sudo apt update
          sudo apt-get install mariadb-client

      - name: Setup Frappe bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install app
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app frappe_factory_bot https://github.com/harshtandiya/frappe_factory_bot.git --branch main
          bench get-app forms_pro $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app forms_pro
          bench --site test_site set-config allow_tests true
          bench build
        env:
          CI: "Yes"

      - name: Start Frappe server
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config server_script_enabled true
          bench serve --port 8001 &
          npx wait-on http://localhost:8001 --timeout 60000
        env:
          CI: "Yes"

      - name: Install Playwright browsers
        working-directory: ${{ github.workspace }}/frontend
        run: |
          yarn install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ${{ github.workspace }}/frontend
        run: yarn test:e2e
        env:
          BASE_URL: http://localhost:8001
          TEST_ADMIN_PASSWORD: admin
          CI: "true"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/e2e/test-results/
          retention-days: 7
